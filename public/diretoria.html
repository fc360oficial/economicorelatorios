<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Diretoria — Econômico Relatórios</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08111F;--bg2:#0B1220;
  --card:#121B2E;--card2:#172033;
  --brand:#FACC15;--brand2:#FFC72C;
  --brand-glow:rgba(250,204,21,.20);--brand-dim:rgba(250,204,21,.08);
  --green:#22C55E;--green-glow:rgba(34,197,94,.35);
  --red:#EF4444;--red-glow:rgba(239,68,68,.35);
  --text:#FFFFFF;--text2:#94A3B8;--text3:#64748B;
  --border:rgba(255,255,255,.06);--border-md:rgba(255,255,255,.10);
  --r:20px;--r-sm:12px;
  --sh:0 8px 32px rgba(0,0,0,.35);
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 70% at 5% 50%,rgba(59,130,246,.04) 0%,transparent 60%),
    radial-gradient(ellipse 45% 45% at 95% 10%,rgba(250,204,21,.05) 0%,transparent 60%),
    radial-gradient(ellipse 35% 55% at 50% 105%,rgba(34,197,94,.03) 0%,transparent 50%);
}

/* HEADER */
header{
  position:relative;z-index:100;height:80px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(23,32,51,.99),rgba(18,27,46,.96));
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-md);
  box-shadow:0 4px 40px rgba(0,0,0,.55),0 1px 0 rgba(250,204,21,.08);
  padding:0 32px;display:flex;align-items:center;gap:24px;
}
.h-logo{height:56px;filter:brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(-8deg);flex-shrink:0}
.h-brand{flex-shrink:0}
.h-brand h1{font-size:12px;font-weight:900;color:var(--brand);letter-spacing:2px;text-transform:uppercase;line-height:1}
.h-brand p{font-size:8px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;margin-top:3px}
.h-sep{width:1px;height:44px;background:var(--border-md);flex-shrink:0}
.h-clock{text-align:center;flex-shrink:0}
.clock-time{font-size:58px;font-weight:900;color:#fff;letter-spacing:4px;font-variant-numeric:tabular-nums;line-height:1;
  text-shadow:0 0 40px rgba(255,255,255,.15)}
.clock-sub{display:flex;gap:12px;justify-content:center;margin-top:3px}
.clock-date{font-size:10px;color:var(--text3)}
.clock-semana{font-size:10px;color:var(--brand);font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
.h-fill{flex:1}
.h-title{text-align:right;flex-shrink:0}
.h-title h2{font-size:13px;font-weight:900;color:var(--brand);letter-spacing:2.5px;text-transform:uppercase;line-height:1}
.h-title p{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}

/* TIMER BAR */
.timer-bar-wrap{height:3px;background:rgba(250,204,21,.12);flex-shrink:0;position:relative;z-index:1}
.timer-bar{height:100%;background:var(--brand);width:100%}

/* GRID */
.grid{
  flex:1;display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:12px;padding:12px;overflow:hidden;
  position:relative;z-index:1;
}

/* CARD */
.card{
  background:linear-gradient(160deg,var(--card2) 0%,var(--card) 60%,rgba(8,17,31,.9) 100%);
  border:1px solid var(--border-md);border-radius:var(--r);
  display:flex;flex-direction:column;
  box-shadow:var(--sh);
  position:relative;overflow:hidden;
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
.card:nth-child(1){animation-delay:.04s}
.card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.12s}
.card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.20s}
.card:nth-child(6){animation-delay:.24s}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(255,255,255,.025) 0%,rgba(255,255,255,0) 50%);
  pointer-events:none;
}

/* Accent bar no topo do card */
.card-accent{height:4px;width:100%;flex-shrink:0;
  background:linear-gradient(90deg,var(--brand),rgba(250,204,21,.25))}

.card-body{padding:16px 20px 14px;display:flex;flex-direction:column;gap:8px;flex:1}

.card-loja{
  font-size:9px;font-weight:900;color:var(--brand);
  text-transform:uppercase;letter-spacing:2.5px;
}
.card-fat{
  font-size:32px;font-weight:900;color:#fff;
  letter-spacing:-0.5px;line-height:1;
  text-shadow:0 0 30px rgba(255,255,255,.08);
}
.card-ant{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-ant-val{font-size:11px;color:var(--text2)}
.badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:800;padding:1px 7px;border-radius:20px;
}
.badge.up{color:var(--green);background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25)}
.badge.dn{color:var(--red);background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25)}

.card-sep{height:1px;background:var(--border);margin:2px 0}

.card-kpis{display:flex;gap:0}
.kpi{
  flex:1;display:flex;flex-direction:column;gap:3px;
  padding:8px 12px;border-right:1px solid var(--border);
}
.kpi:last-child{border-right:none}
.kpi-label{font-size:8px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}
.kpi-val{font-size:20px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;line-height:1.1}
.kpi-val.msv{color:var(--brand);text-shadow:0 0 20px var(--brand-glow)}

.card-prog-wrap{height:3px;background:rgba(255,255,255,.06);margin:0 20px 14px;border-radius:2px}
.card-prog{height:100%;border-radius:2px;background:linear-gradient(90deg,#3B82F6,var(--brand))}

.loading{
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:14px;grid-column:1/-1;grid-row:1/-1;
}
</style>
</head>
<body>

<header>
  <img class="h-logo" src="/logo.png" alt="Econômico">
  <div class="h-brand">
    <h1>FC360</h1>
    <p>Relatórios</p>
  </div>
  <div class="h-sep"></div>
  <div class="h-clock">
    <div class="clock-time" id="clock">00:00:00</div>
    <div class="clock-sub">
      <span class="clock-date" id="clock-date"></span>
      <span class="clock-semana" id="clock-sem"></span>
    </div>
  </div>
  <div class="h-fill"></div>
  <div class="h-title">
    <h2>Visão Diretoria</h2>
    <p>KPIs do mês por loja</p>
  </div>
</header>

<div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>

<div class="grid" id="grid">
  <div class="loading">Carregando...</div>
</div>

<script>
const LOJAS = {1:'Loja 1',2:'Loja 2',3:'Loja 3',4:'Loja 4',5:'Loja 5',6:'Loja 6'};
const TEMPO_TELA = 25000;

// ── RELÓGIO ──
const SEMANAS   = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const MESES_EX  = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
function atualizarRelogio() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock-date').textContent = `${n.getDate()} de ${MESES_EX[n.getMonth()]} de ${n.getFullYear()}`;
  document.getElementById('clock-sem').textContent  = SEMANAS[n.getDay()];
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

// ── TIMER BAR ──
let timerAnim = null;
function iniciarTimer() {
  const bar = document.getElementById('timer-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  void bar.offsetWidth;
  bar.style.transition = `width ${TEMPO_TELA}ms linear`;
  bar.style.width = '0%';
  if (timerAnim) clearTimeout(timerAnim);
  timerAnim = setTimeout(() => {
    try { window.parent.postMessage({ type: 'diretoriaCycleComplete' }, '*'); } catch(_) {}
  }, TEMPO_TELA);
}

// ── RENDER ──
function fmt(v) {
  return v.toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function renderGrid(data) {
  const grid = document.getElementById('grid');
  const hoje = new Date();
  const pctMes = Math.round(hoje.getDate() / new Date(hoje.getFullYear(), hoje.getMonth()+1, 0).getDate() * 100);

  grid.innerHTML = '';
  for (const lj of data.lojas) {
    const up   = lj.variacao >= 0;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-loja">${LOJAS[lj.loja] || 'Loja '+lj.loja}</div>
        <div class="card-fat">R$ ${fmt(lj.faturamento)}</div>
        <div class="card-ant">
          <span class="card-ant-val">Mesmo período ${data.ano_ant}: R$ ${fmt(lj.fat_ant_ate_dia)}</span>
          <span class="badge ${up?'up':'dn'}">${up?'▲':'▼'} ${Math.abs(lj.variacao).toFixed(1)}%</span>
        </div>
        <div class="card-sep"></div>
        <div class="card-kpis">
          <div class="kpi">
            <div class="kpi-label">Ticket Médio</div>
            <div class="kpi-val">R$ ${fmt(lj.ticket)}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Margem S/V</div>
            <div class="kpi-val msv">${lj.msv.toFixed(1)}%</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Cupons</div>
            <div class="kpi-val">${lj.cupons.toLocaleString('pt-BR')}</div>
          </div>
        </div>
      </div>
      <div class="card-prog-wrap"><div class="card-prog" style="width:${pctMes}%"></div></div>
    `;
    grid.appendChild(card);
  }
}

// ── DADOS ──
async function buscarDados() {
  try {
    const r = await fetch('/api/diretoria/kpis');
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    renderGrid(data);
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="loading" style="color:#ef4444">Erro ao carregar (${e.message})</div>`;
  }
}

async function init() {
  await buscarDados();
  iniciarTimer();
}

init();
setInterval(buscarDados, 3 * 60 * 1000);
</script>
</body>
</html>
