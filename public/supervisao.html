<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Supervisão — Econômico Relatórios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#08111F;font-family:'Segoe UI',sans-serif}

/* BARRA SUPERIOR */
.top{
  height:36px;background:#0d1b2e;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;
}
.top-title{font-size:11px;font-weight:700;color:#facc15;letter-spacing:2px;text-transform:uppercase}
.top-links{display:flex;gap:6px;margin-left:auto}
.top-links a{
  font-size:10px;font-weight:700;color:#64748b;text-decoration:none;
  padding:3px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.08);
  transition:all .2s;
}
.top-links a:hover{color:#facc15;border-color:rgba(250,204,21,.4)}
.top-links a.ativo{color:#facc15;border-color:rgba(250,204,21,.4);background:rgba(250,204,21,.06)}

/* LAYOUTS */
.frame-wrap{width:100%;height:calc(100vh - 36px);display:flex;gap:0}
.frame-wrap iframe{border:none;flex:1;height:100%}
.frame-wrap .divider{width:2px;background:rgba(255,255,255,.06);flex-shrink:0}

.frame-wrap.modo-compras    iframe:last-child  { display:none }
.frame-wrap.modo-precif     iframe:first-child { display:none }
.frame-wrap.modo-compras    .divider           { display:none }
.frame-wrap.modo-precif     .divider           { display:none }
</style>
</head>
<body>

<div class="top">
  <span class="top-title">Supervisão</span>
  <div class="top-links">
    <a href="#" onclick="setModo('todos')" id="btn-todos" class="ativo">Todos</a>
    <a href="#" onclick="setModo('compras')" id="btn-compras">Compras</a>
    <a href="#" onclick="setModo('precificacao')" id="btn-precif">Precificação</a>
  </div>
</div>

<div class="frame-wrap" id="wrap">
  <iframe id="fr-compras" src="/compras.html" title="Compras"></iframe>
  <div class="divider"></div>
  <iframe id="fr-precif" src="/precificacao.html" title="Precificação"></iframe>
</div>

<script>
function setModo(modo) {
  const wrap = document.getElementById('wrap');
  wrap.className = 'frame-wrap' + (modo !== 'todos' ? ' modo-' + (modo === 'compras' ? 'compras' : 'precif') : '');
  ['todos','compras','precificacao'].forEach(m => {
    const id = m === 'todos' ? 'btn-todos' : m === 'compras' ? 'btn-compras' : 'btn-precif';
    document.getElementById(id).classList.toggle('ativo', m === modo);
  });
  // atualiza URL sem recarregar
  history.replaceState(null,'','?modo=' + modo);
}

// lê modo da URL ao abrir
const params = new URLSearchParams(location.search);
const modoInicial = params.get('modo') || 'todos';
setModo(modoInicial);
</script>
</body>
</html>
