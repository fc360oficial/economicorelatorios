<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Supervisão — Econômico Relatórios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border:none;opacity:0;pointer-events:none;transition:opacity .6s;
}
iframe.visivel{opacity:1;pointer-events:auto}

/* Indicador discreto no canto */
.dots{
  position:fixed;bottom:10px;right:14px;z-index:999;
  display:flex;gap:6px;align-items:center;
}
.dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.18);transition:background .4s;
}
.dot.ativo{background:rgba(250,204,21,.85)}
</style>
</head>
<body>

<!-- Compras roda o próprio ciclo: compras.html → cada comprador (15s) → volta -->
<iframe id="fr-compras" src="/compras.html" title="Compras"></iframe>

<!-- Precificação roda o carrossel de 6 colunas e avisa quando termina -->
<iframe id="fr-precif"  src="/precificacao.html" title="Precificação"></iframe>

<div class="dots">
  <div class="dot ativo" id="dot-c" title="Compras"></div>
  <div class="dot"       id="dot-p" title="Precificação"></div>
</div>

<script>
let atual = 'compras';

const frC   = document.getElementById('fr-compras');
const frP   = document.getElementById('fr-precif');
const dotC  = document.getElementById('dot-c');
const dotP  = document.getElementById('dot-p');

function mostrarCompras() {
  atual = 'compras';
  // Reinicia compras sempre do início (main page)
  frC.src = '/compras.html';
  frC.classList.add('visivel');
  frP.classList.remove('visivel');
  dotC.classList.add('ativo');
  dotP.classList.remove('ativo');
}

function mostrarPrecif() {
  atual = 'precif';
  frP.classList.add('visivel');
  frC.classList.remove('visivel');
  dotP.classList.add('ativo');
  dotC.classList.remove('ativo');
}

window.addEventListener('message', (e) => {
  if (!e.data || !e.data.type) return;

  // Compras terminou todos os compradores → vai para precificação
  if (e.data.type === 'comprasCycleComplete' && atual === 'compras') {
    mostrarPrecif();
  }

  // Precificação terminou o carrossel (coluna 6 → volta para 1) → volta para compras
  if (e.data.type === 'carouselCycleComplete' && atual === 'precif') {
    mostrarCompras();
  }
});

// Inicia mostrando compras
frC.classList.add('visivel');
</script>
</body>
</html>
